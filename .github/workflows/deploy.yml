name: Deploy production

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS OVH
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://mychronos.fr
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync release
        run: |
          RELEASE="releases/v-${GITHUB_SHA:0:7}-$(date +%s)"
          rsync -avz --delete \
            --exclude 'node_modules' --exclude '.git' --exclude '.github' \
            --exclude '.env*' --exclude 'coverage' --exclude 'ios' \
            --exclude 'chronos-android' \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.VPS_HOST }}:/var/www/chronos/$RELEASE/"
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV

      - name: Install, symlink, restart
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.VPS_HOST }}" bash -s <<'BASH'
          set -euo pipefail
          cd /var/www/chronos
          cd ${{ env.RELEASE }}
          npm ci --omit=dev
          ln -sfn "$(pwd)" /var/www/chronos/current
          pm2 reload chronos --update-env
          # Garder les 5 dernières releases
          cd /var/www/chronos/releases
          ls -1t | tail -n +6 | xargs -I {} rm -rf {} || true
          BASH

      - name: Healthcheck
        run: |
          sleep 5
          for i in 1 2 3; do
            if curl -fsS https://mychronos.fr/api/health | grep -q '"status":"ok"'; then
              echo "Healthcheck OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 3
          done
          echo "Healthcheck FAIL"
          exit 1
